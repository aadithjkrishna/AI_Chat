<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Streaming Chatbot</title>
    <link rel="stylesheet" href="/css/home.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="model-selector">
        <label for="model-select">🤖 Model:</label>
        <select id="model-select">
            <option value="llama3.2:3b">Loading models...</option>
        </select>
    </div>
    <div class="chat-wrapper">
        <div class="chat-header" id="chat-header-title">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>Ollama Chat</span>
                <button id="dark-mode-toggle" class="theme-toggle" title="Toggle dark mode">
                    <svg id="sun-icon" style="display: none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="moon-icon" style="display: inline;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="chat-box" id="chat-box">
            <div id="welcome-container" class="welcome-container">
                <h1>Good evening, Aadith.</h1>
                <p>How can I help you discover or create today?</p>
            </div>
        </div>

        <div class="input-container">
            <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.pdf,.txt,.c,.cpp,.h" style="display: none;">
            <button id="upload-btn" type="button">📎</button>
            <input type="text" id="user-input" placeholder="Ask anything..." autofocus>
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="/scripts/home.js"></script>
</body>

</html>
